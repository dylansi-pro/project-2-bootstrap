      <nav class="navbar navbar-expand-lg py-0 main-header fixed-top">

          <a class="navbar-brand" href="index.html">

            />
          </a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNavDropdown"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNavDropdown">
            <ul class="navbar-nav ms-auto gap-4">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  id="aboutDropdown"
                  role="button"
                  data-bs-toggle="dropdown"
                  >About us</a
                >
                <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item" href="about.html">Overview</a>
                  </li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a class="dropdown-item" href="about.html#staff"
                      >Our Staff</a
                    >
                  </li>
                </ul>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  id="menuDropdown"
                  role="button"
                  data-bs-toggle="dropdown"
                  >Our Menu</a
                >
                <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item" href="menu.html">View All</a>
                  </li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a class="dropdown-item" href="menu.html#coffee"
                      >Specialty Coffee</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="menu.html#pastries"
                      >Pastries</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="menu.html#brunch">Brunch</a>
                  </li>
                </ul>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="gallery.html">Gallery</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active-koko" href="contact.html">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <main class="container py-5 mt-5">
        <div class="d-flex align-items-center mb-5 py-5 px-4 bg-koko-intro">
          <div class="w-100">
            <h1 class="display-5 fw-bold mb-2">Contact Us</h1>
            <p class="text-muted fs-5 fst-italic mb-0">
              We'd love to hear from you.
            </p>
          </div>
        </div>

        <div class="row justify-content-center">
          <div class="col-lg-8 col-xl-7">
            <form
              action="https://hnitest.go.yj.fr"
              method="POST"
              class="bg-white p-4 shadow-sm border rounded"
            >
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="firstname" class="form-label fw-bold"
                    >First name :</label
                  >
                  <input
                    class="form-control"
                    id="firstname"
                    type="text"
                    name="firstname"
                    required
                  />
                </div>
                <div class="col-md-6 mb-3">
                  <label for="lastname" class="form-label fw-bold"
                    >Last name :</label
                  >
                  <input
                    class="form-control"
                    id="lastname"
                    type="text"
                    name="lastname"
                    required
                  />
                </div>
              </div>

              <div class="mb-3">
                <label for="mail" class="form-label fw-bold"
                  >Email address :</label
                >
                <input
                  class="form-control"
                  id="mail"
                  type="email"
                  name="mail"
                  placeholder="yourmail@yahoo.com"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="country" class="form-label fw-bold"
                  >Country :</label
                >
                <select
                  class="form-select"
                  name="country"
                  id="country"
                  required
                >
                  <option value="">-- Select a country --</option>
                  <option value="france">France</option>
                  <option value="belgium">Belgium</option>
                  <option value="switzerland">Switzerland</option>
                  <option value="united kingdom">United Kingdom</option>
                  <option value="spain">Spain</option>
                  <option value="germany">Germany</option>
                  <option value="other">Other</option>
                </select>
              </div>

              <div class="mb-4">
                <label for="request" class="form-label fw-bold"
                  >Request :</label
                >
                <textarea
                  class="form-control"
                  name="request"
                  id="request"
                  rows="6"
                  required
                ></textarea>
              </div>

              <div class="mb-0">
                <button type="submit" class="btn btn-koko w-100 py-2 fw-bold">
                  Send
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>

      <footer class="main-footer-custom">
        <p class="mb-0">&copy; 2026 Koko Café.</p>
      </footer>
    </div>
  </body>
</html>
