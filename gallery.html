<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koko Café | Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <div class="site-container">
      <nav class="navbar navbar-expand-lg py-0 main-header fixed-top">
        <div class="container-fluid px-0">
          <a class="navbar-brand" href="index.html">
            <img
              src="images/koko_cafe_logo.png"
              alt="Koko Café Logo"
              class="logo-img"
            />
          </a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNavDropdown"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNavDropdown">
            <ul class="navbar-nav ms-auto gap-4">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  id="aboutDropdown"
                  role="button"
                  data-bs-toggle="dropdown"
                  >About us</a
                >
                <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item" href="about.html">Overview</a>
                  </li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a class="dropdown-item" href="about.html#staff"
                      >Our Staff</a
                    >
                  </li>
                </ul>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  id="menuDropdown"
                  role="button"
                  data-bs-toggle="dropdown"
                  >Our Menu</a
                >
                <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item" href="menu.html">View All</a>
                  </li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a class="dropdown-item" href="menu.html#coffee"
                      >Specialty Coffee</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="menu.html#pastries"
                      >Pastries</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="menu.html#brunch">Brunch</a>
                  </li>
                </ul>
              </li>
              <li class="nav-item">
                <a class="nav-link active-koko" href="gallery.html">Gallery</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="contact.html">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <main class="container py-5 mt-5">
        <div
          class="d-flex align-items-center mb-5 py-5 px-4 bg-koko-intro text-center"
        >
          <div class="w-100">
            <h1 class="display-6 fw-bold mb-3">Gallery</h1>
            <p class="text-muted fs-5 fst-italic mb-0">
              A glimpse into our cozy space, fresh brews, and daily treats.
            </p>
          </div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 g-4 px-4 pb-5">
          <div class="col">
            <div class="gallery-item rounded-3 shadow-sm overflow-hidden">
              <img
                src="images/cafe-interior.jpg"
                alt="Koko Café storefront"
                class="w-100"
              />
            </div>
          </div>

          <div class="col">
            <div class="gallery-item rounded-3 shadow-sm overflow-hidden">
              <img
                src="images/cat.jpg"
                alt="Barista making latte art"
                class="w-100"
              />
            </div>
          </div>

          <div class="col">
            <div class="gallery-item rounded-3 shadow-sm overflow-hidden">
              <img
                src="images/study.jpg"
                alt="Cozy seating corner"
                class="w-100"
              />
            </div>
          </div>

          <div class="col">
            <div class="gallery-item rounded-3 shadow-sm overflow-hidden">
              <img
                src="images/pastries.jpg"
                alt="Freshly baked pastries"
                class="w-100"
              />
            </div>
          </div>

          <div class="col">
            <div class="gallery-item rounded-3 shadow-sm overflow-hidden">
              <img
                src="images/gallery-vibe.jpg"
                alt="People enjoying coffee"
                class="w-100"
              />
            </div>
          </div>

          <div class="col">
            <div class="gallery-item rounded-3 shadow-sm overflow-hidden">
              <img
                src="images/grain.jpg"
                alt="Our coffee beans display"
                class="w-100"
              />
            </div>
          </div>
        </div>
      </main>

      <footer class="main-footer-custom">
        <p class="mb-0">&copy; 2026 Koko Café.</p>
      </footer>
    </div>
  </body>
</html>
